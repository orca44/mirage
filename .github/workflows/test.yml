name: Test

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml

      - name: Install Python dependencies
        working-directory: python
        run: uv sync --all-extras --no-extra camel

      - name: Install TypeScript dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile

      - name: Install package
        working-directory: python
        run: uv pip install .

      - name: Run pytest (main suite, camel excluded)
        working-directory: python
        env:
          REDIS_URL: redis://localhost:6379/0
        run: uv run pytest --ignore=tests/agents/camel

      - name: Sync Python dependencies for camel
        working-directory: python
        run: uv sync --extra camel

      - name: Run pytest (camel toolkit tests)
        working-directory: python
        run: uv run pytest tests/agents/camel

      - name: Build TypeScript packages
        working-directory: typescript
        run: pnpm -r build

      - name: Run TypeScript tests
        working-directory: typescript
        run: pnpm test
